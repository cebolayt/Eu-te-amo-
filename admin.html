<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
  max-width: 400px;
  margin: auto;
}

input {
  padding: 10px;
  border: none;
  border-radius: 10px;
  margin: 10px;
  width: 80%;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #00ff9d;
  cursor: pointer;
}

#painel {
  display: none;
  margin-top: 20px;
}

.card {
  background: white;
  color: black;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>

</head>
<body>

<div class="container">

<h2>🔐 Painel Admin</h2>

<!-- login simples -->
<div id="login">
  <input type="password" id="senha" placeholder="Digite a senha">
  <br>
  <button onclick="entrar()">Entrar</button>
</div>

<!-- painel -->
<div id="painel">
  <h3>📊 Resultado</h3>
  <div id="dados"></div>

  <button onclick="limpar()">🗑️ Resetar resposta</button>
</div>

</div>

<script>

/* ===== SENHA ===== */
const senhaCorreta = "1234";

/* ===== LOGIN ===== */
function entrar() {
  const senha = document.getElementById("senha").value;

  if (senha === senhaCorreta) {
    document.getElementById("login").style.display = "none";
    document.getElementById("painel").style.display = "block";
    carregarDados();
  } else {
    alert("Senha errada!");
  }
}

/* ===== CARREGAR DADOS ===== */
function carregarDados() {
  const dados = JSON.parse(localStorage.getItem("pedido"));

  if (dados) {
    document.getElementById("dados").innerHTML =
      '<div class="card">' +
      '<p><b>Resposta:</b> ' + dados.resposta + '</p>' +
      '<p><b>Data:</b> ' + dados.data + '</p>' +
      '<p><b>Hora:</b> ' + dados.hora + '</p>' +
      '</div>';
  } else {
    document.getElementById("dados").innerHTML =
      "<p>Nenhuma resposta ainda 😢</p>";
  }
}

/* ===== LIMPAR ===== */
function limpar() {
  localStorage.removeItem("pedido");
  alert("Dados apagados!");
  carregarDados();
}

</script>

</body>
</html>
